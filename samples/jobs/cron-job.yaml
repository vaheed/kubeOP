apiVersion: batch/v1
kind: CronJob
metadata:
  name: sample-cron-job
  labels:
    kubeop.cluster.id: "<cluster-id>"
    kubeop.project.id: "<project-id>"
    kubeop.project.name: "sample-project"
    kubeop.app.id: "<app-id>"
    kubeop.app.name: "sample-cron-job"
spec:
  schedule: "0 */6 * * *"
  timeZone: UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 900
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sample-cron-job
        spec:
          restartPolicy: OnFailure
          containers:
            - name: report
              image: ghcr.io/example/reporting:0.4.0
              args:
                - /app/report
                - --output
                - s3://example-bucket/reports
              env:
                - name: REPORT_TIMEZONE
                  value: UTC
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  cpu: "250m"
                  memory: "128Mi"
