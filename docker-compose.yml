version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: kubeop-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-kubeop}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped

  api:
    build: .
    container_name: kubeop-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Compose substitution builds DATABASE_URL if not provided in .env
      DATABASE_URL: ${DATABASE_URL:-postgres://$PGUSER:$PGPASSWORD@postgres:5432/$PGDATABASE?sslmode=disable}
      LOGS_ROOT: ${LOGS_ROOT:-/var/log/kubeop}
      EVENTS_DB_ENABLED: ${EVENTS_DB_ENABLED:-true}
      K8S_EVENTS_BRIDGE: ${K8S_EVENTS_BRIDGE:-false}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./logs:/var/log/kubeop
    restart: unless-stopped

volumes:
  pgdata:

