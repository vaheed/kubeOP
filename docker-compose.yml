version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: kubeop-postgres
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped

  api:
    image: ghcr.io/vaheed/kubeop-api:latest
    build:
      context: .
      target: api
    container_name: kubeop-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    pull_policy: always
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./logs:/var/log/kubeop
    restart: unless-stopped

volumes:
  pgdata:

