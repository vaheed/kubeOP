  # set these repository secrets:
  #   - DEPLOY_HOST: target host/ip
  #   - DEPLOY_USER: ssh username
  #   - DEPLOY_SSH_KEY: private key (PEM) for the user
  #   - DEPLOY_PORT (optional, default 22)
