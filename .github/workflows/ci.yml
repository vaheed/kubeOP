name: ci

permissions:
  contents: read

on:
  push:
    branches: [ "**" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Download deps
        run: go mod download
      - name: Format check (gofmt)
        run: |
          set -euo pipefail
          files=$(gofmt -l $(go list -f '{{.Dir}}' ./...))
          if [ -n "$files" ]; then
            echo "gofmt required on:" >&2
            echo "$files" >&2
            exit 1
          fi
      - name: Enforce AGENTS.md rules (docs + tests updates)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail
          # Determine diff range
          BASE="$PR_BASE_SHA"
          if [ -z "${BASE}" ]; then BASE="$BEFORE_SHA"; fi
          # Treat all-zero SHA as empty
          if echo "${BASE:-}" | grep -Eq '^[0]+$'; then BASE=""; fi
          if [ -z "${BASE}" ]; then BASE="$(git rev-parse HEAD^ 2>/dev/null || echo '')"; fi
          HEAD="$HEAD_SHA"
          echo "Base: $BASE"
          echo "Head: $HEAD"
          if [ -n "$BASE" ]; then
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          else
            # Fallback: compare with merge-base of default branch and HEAD
            MB=$(git merge-base "$HEAD" "origin/${DEFAULT_BRANCH}" 2>/dev/null || echo '')
            if [ -n "$MB" ]; then
              CHANGED=$(git diff --name-only "$MB" "$HEAD")
            else
              # Last resort: list files changed in HEAD commit
              CHANGED=$(git diff-tree --no-commit-id --name-only -r "$HEAD" 2>/dev/null || git ls-files)
            fi
          fi
          echo "$CHANGED" | sed 's/^/changed: /'

          # Ensure all Markdown lives in docs/ or allowed files
          BAD_MD=$(git ls-files "*.md" | grep -v -E '^(docs/.*|README\.md|AGENTS\.md|\.github/ISSUE_TEMPLATE/.*|\.github/pull_request_template\.md)$' || true)
          if [ -n "$BAD_MD" ]; then
            echo "Markdown outside docs/:" >&2
            echo "$BAD_MD" >&2
            exit 1
          fi

          # If code changed under internal/ or cmd/, require docs and tests changed too
          if echo "$CHANGED" | grep -E '^(internal/|cmd/).*' >/dev/null 2>&1; then
            if ! echo "$CHANGED" | grep -E '^(docs/.*\.(md|yaml)|README\.md|AGENTS\.md)$' >/dev/null 2>&1; then
              echo "Code changed but no docs updated (per AGENTS.md)." >&2
              exit 1
            fi
            if ! echo "$CHANGED" | grep -E '^testcase/.*_test\.go$' >/dev/null 2>&1; then
              echo "Code changed but no tests updated under testcase/ (per AGENTS.md)." >&2
              exit 1
            fi
          fi

          # If API-related code changed, require OpenAPI spec update
          if echo "$CHANGED" | grep -E '^(internal/api/|cmd/api/|internal/api/router\.go).*' >/dev/null 2>&1; then
            if ! echo "$CHANGED" | grep -E '^docs/openapi\.yaml$' >/dev/null 2>&1; then
              echo "API code changed but docs/openapi.yaml not updated (per AGENTS.md)." >&2
              exit 1
            fi
          fi
      - name: Lint (go vet)
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Build binaries
        run: |
          mkdir -p dist
          go build -o dist/kubeop-api ./cmd/api
          go build -o dist/kubeop-watcher ./cmd/kubeop-watcher
      - name: Upload API binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeop-api-${{ github.sha }}
          path: dist/kubeop-api
      - name: Upload watcher binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeop-watcher-${{ github.sha }}
          path: dist/kubeop-watcher
      - name: Ensure testcase contains tests
        run: |
          if ! ls -1 testcase/*_test.go >/dev/null 2>&1; then
            echo "No *_test.go files found in testcase/" >&2
            exit 1
          fi
      - name: Run testcase package tests
        run: go test -v -count=1 ./testcase
      - name: Run all package tests
        run: go test -count=1 ./...
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install docs dependencies
        run: npm ci
      - name: Build documentation
        run: npm run docs:build

  docker:
    name: Docker Build & Push
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Build only amd64 on branches for speed; do multi-arch on tags
      PLATFORMS: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract API metadata (tags, labels)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kubeop-api
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            # Add 'latest' tag on main/master branches
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
      - name: Extract watcher metadata (tags, labels)
        id: meta_watcher
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kubeop-watcher
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}
          platforms: ${{ env.PLATFORMS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta_api.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
      - name: Build and push watcher image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: watcher
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}
          platforms: ${{ env.PLATFORMS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta_watcher.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta_watcher.outputs.tags }}
          labels: ${{ steps.meta_watcher.outputs.labels }}

