name: ci

on:
  push:
    branches: [ "**" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Download deps
        run: go mod download
      - name: Enforce AGENTS.md rules (docs + tests updates)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Determine diff range
          BASE="$PR_BASE_SHA"
          if [ -z "${BASE}" ]; then BASE="$BEFORE_SHA"; fi
          if [ -z "${BASE}" ]; then BASE="$(git rev-parse HEAD^ || echo '')"; fi
          HEAD="$HEAD_SHA"
          echo "Base: $BASE"
          echo "Head: $HEAD"
          if [ -n "$BASE" ]; then
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          else
            CHANGED=$(git diff --name-only)
          fi
          echo "$CHANGED" | sed 's/^/changed: /'

          # Ensure all Markdown lives in docs/ or allowed files
          BAD_MD=$(git ls-files "*.md" | grep -v -E '^(docs/.*|README\.md|AGENTS\.md)$' || true)
          if [ -n "$BAD_MD" ]; then
            echo "Markdown outside docs/:" >&2
            echo "$BAD_MD" >&2
            exit 1
          fi

          # If code changed under internal/ or cmd/, require docs and tests changed too
          if echo "$CHANGED" | grep -E '^(internal/|cmd/).*' >/dev/null 2>&1; then
            if ! echo "$CHANGED" | grep -E '^(docs/.*\.md|README\.md|AGENTS\.md)$' >/dev/null 2>&1; then
              echo "Code changed but no docs updated (per AGENTS.md)." >&2
              exit 1
            fi
            if ! echo "$CHANGED" | grep -E '^testcase/.*_test\.go$' >/dev/null 2>&1; then
              echo "Code changed but no tests updated under testcase/ (per AGENTS.md)." >&2
              exit 1
            fi
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Ensure testcase contains tests
        run: |
          if ! ls -1 testcase/*_test.go >/dev/null 2>&1; then
            echo "No *_test.go files found in testcase/" >&2
            exit 1
          fi
      - name: Run testcase package tests
        run: go test -v -count=1 ./testcase
      - name: Run all package tests
        run: go test -count=1 ./...

  docker:
    name: Docker Build & Push
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Build only amd64 on branches for speed; do multi-arch on tags
      PLATFORMS: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            # Add 'latest' tag on main/master branches
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}
          platforms: ${{ env.PLATFORMS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ----------------------------------------------------------------------------
  # SSH DEPLOY (DISABLED BY DEFAULT)
  #
