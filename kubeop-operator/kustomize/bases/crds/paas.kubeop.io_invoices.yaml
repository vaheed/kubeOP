kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.3
  name: invoices.paas.kubeop.io
spec:
  group: paas.kubeop.io
  names:
    kind: Invoice
    listKind: InvoiceList
    plural: invoices
    singular: invoice
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.subjectRef
      name: SUBJECT
      type: string
    - jsonPath: .spec.period
      name: PERIOD
      type: string
    - jsonPath: .spec.total
      name: TOTAL
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: READY
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Invoice captures billing totals for a subject.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InvoiceSpec defines an invoice aggregating billing usage.
            properties:
              lineItems:
                description: LineItems lists metered line items.
                items:
                  description: InvoiceLineItem describes a billed item on an invoice.
                  properties:
                    meter:
                      description: Meter identifies the metered resource.
                      minLength: 1
                      type: string
                    quantity:
                      description: Quantity records the consumed quantity for the
                        meter.
                      minLength: 1
                      type: string
                    rate:
                      description: Rate records the unit price.
                      minLength: 1
                      type: string
                    total:
                      description: Total records the line item total.
                      minLength: 1
                      type: string
                  required:
                  - meter
                  - quantity
                  - rate
                  - total
                  type: object
                minItems: 1
                type: array
              period:
                description: Period identifies the billing period (e.g., 2025-10).
                pattern: ^\d{4}-\d{2}$
                type: string
              subjectRef:
                description: SubjectRef references the invoiced subject name.
                minLength: 1
                type: string
              subjectType:
                description: SubjectType identifies the invoiced subject type.
                enum:
                - tenant
                - project
                - app
                type: string
              total:
                description: Total summarises the invoice total amount.
                minLength: 1
                type: string
            required:
            - lineItems
            - period
            - subjectRef
            - subjectType
            - total
            type: object
          status:
            description: InvoiceStatus reports issuance details for an invoice.
            properties:
              conditions:
                description: Conditions summarise invoice delivery status.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
