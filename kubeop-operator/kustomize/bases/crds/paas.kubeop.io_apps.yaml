---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.3
  name: apps.paas.kubeop.io
spec:
  group: paas.kubeop.io
  names:
    kind: App
    listKind: AppList
    plural: apps
    singular: app
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: TYPE
      type: string
    - jsonPath: .status.revision
      name: REVISION
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: READY
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: App represents a kubeOP managed workload rendered from templates,
          Helm, Git, or raw manifests.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AppSpec defines the desired state of an application managed
              by kubeOP.
            properties:
              hosts:
                description: Hosts enumerates ingress hosts for direct image deployments.
                items:
                  type: string
                type: array
              image:
                description: Image references a container image when direct image
                  deployments are used.
                type: string
              ingressRefs:
                description: IngressRefs references IngressRoute resources consumed
                  by the app.
                items:
                  type: string
                type: array
              replicas:
                description: Replicas declares the desired replica count for workloads
                  rendered from images.
                format: int32
                type: integer
              rollout:
                description: Rollout defines rollout behaviour for the application.
                properties:
                  healthChecks:
                    description: HealthChecks declares endpoints used to validate
                      rollout success.
                    items:
                      description: AppHealthCheck defines readiness probes for rollouts.
                      properties:
                        endpoint:
                          description: Endpoint records the endpoint or port for the
                            health check.
                          minLength: 1
                          type: string
                        type:
                          description: Type identifies the health check protocol.
                          enum:
                          - http
                          - tcp
                          type: string
                      required:
                      - endpoint
                      - type
                      type: object
                    type: array
                  maxUnavailable:
                    description: MaxUnavailable defines the number of replicas that
                      can be unavailable during the rollout.
                    format: int32
                    type: integer
                  strategy:
                    description: Strategy selects the rollout approach for updates.
                    enum:
                    - rolling
                    - blueGreen
                    - canary
                    type: string
                type: object
              secretsRefs:
                description: SecretsRefs references SecretRef resources providing
                  sensitive data.
                items:
                  type: string
                type: array
              semverRange:
                description: VersionRange contains a semantic version range when automatic
                  updates are enabled.
                type: string
              serviceProfile:
                description: ServiceProfile defines service exposure defaults.
                properties:
                  internal:
                    description: Internal determines whether the service is internal-only.
                    type: boolean
                  ports:
                    description: Ports lists service ports exposed by the application.
                    items:
                      format: int32
                      type: integer
                    type: array
                type: object
              source:
                description: Source describes the upstream source for manifests or
                  charts.
                properties:
                  chart:
                    description: Chart references a Helm chart name when using chart
                      repositories.
                    type: string
                  ref:
                    description: Ref captures a git reference (branch, tag, commit)
                      or OCI digest.
                    type: string
                  url:
                    description: URL points at the source repository, registry, or
                      manifest base.
                    type: string
                type: object
              type:
                description: Type selects the delivery mechanism for the application.
                enum:
                - helmRepo
                - helmOCI
                - kustomize
                - raw
                - git
                type: string
              valuesRefs:
                description: ValuesRefs references ConfigRef resources providing Helm
                  values.
                items:
                  type: string
                type: array
              version:
                description: Version pin for the application release.
                type: string
            required:
            - type
            type: object
          status:
            description: AppStatus captures the observed state of an application reconciliation.
            properties:
              availableReplicas:
                description: AvailableReplicas reports the number of pods available
                  for the workload.
                format: int32
                type: integer
              conditions:
                description: Conditions represents the latest reconcile conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration mirrors the metadata generation observed
                  by the controller.
                format: int64
                type: integer
              revision:
                description: Revision stores the rendered revision identifier.
                type: string
              sync:
                description: Sync records the reconciliation status summary.
                type: string
              urls:
                description: URLs lists externally accessible endpoints associated
                  with the app.
                items:
                  type: string
                type: array
            type: object
        type: object
        x-kubernetes-validations:
        - message: metadata.labels.paas.kubeop.io/tenant is required
          rule: has(self.metadata.labels['paas.kubeop.io/tenant'])
        - message: metadata.labels.paas.kubeop.io/project is required
          rule: has(self.metadata.labels['paas.kubeop.io/project'])
        - message: metadata.labels.paas.kubeop.io/app is required
          rule: has(self.metadata.labels['paas.kubeop.io/app'])
        - message: metadata.labels.paas.kubeop.io/env is required
          rule: has(self.metadata.labels['paas.kubeop.io/env'])
        - message: valuesRefs cannot be empty when specified
          rule: '!has(self.spec.valuesRefs) || size(self.spec.valuesRefs) > 0'
        - message: valuesRefs required for Helm-based applications
          rule: '!(self.spec.type in [''helmRepo'',''helmOCI'']) || size(self.spec.valuesRefs)
            > 0'
    served: true
    storage: true
    subresources:
      status: {}
