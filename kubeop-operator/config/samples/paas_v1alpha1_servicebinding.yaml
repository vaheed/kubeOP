apiVersion: paas.kubeop.io/v1alpha1
kind: ServiceBinding
metadata:
  name: sample-binding
  namespace: platform-system
  labels:
    paas.kubeop.io/tenant: sample-tenant
    paas.kubeop.io/project: sample-project
spec:
  consumerRef:
    type: app
    name: sample-app
  providerRef:
    type: database
    name: sample-db
  injectAs: env
