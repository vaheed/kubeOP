apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apps.kubeop.io
  labels:
    app.kubernetes.io/name: kubeop-operator
    app.kubernetes.io/component: crd
spec:
  group: kubeop.io
  scope: Namespaced
  names:
    plural: apps
    singular: app
    kind: App
    listKind: AppList
    shortNames:
      - app
    categories:
      - kubeop
      - apps
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                  description: Container image to deploy when Helm or Git sources are not provided.
                replicas:
                  type: integer
                  format: int32
                  minimum: 0
                  description: Desired number of replicas for the application workload.
                hosts:
                  type: array
                  description: Ingress hostnames that should route to the rendered service.
                  items:
                    type: string
              additionalProperties: false
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                availableReplicas:
                  type: integer
                  format: int32
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
              additionalProperties: false
          additionalProperties: false
