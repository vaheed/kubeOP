apiVersion: v1
kind: Namespace
metadata:
  name: kubeop
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeop-env
  namespace: kubeop
data:
  PORT: "8080"
  LOG_LEVEL: "info"
  DATABASE_URL: "postgres://kubeop:password@postgres:5432/kubeop?sslmode=require"
  LOGS_ROOT: "/var/lib/kubeop/logs"
  EVENTS_DB_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeop-api
  namespace: kubeop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeop-api
  template:
    metadata:
      labels:
        app: kubeop-api
    spec:
      containers:
        - name: api
          image: ghcr.io/vaheed/kubeop-api:latest
          envFrom:
            - configMapRef:
                name: kubeop-env
            - secretRef:
                name: kubeop-config
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: logs
              mountPath: /var/lib/kubeop/logs
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kubeop-api
  namespace: kubeop
spec:
  selector:
    app: kubeop-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubeop-api
  namespace: kubeop
spec:
  rules:
    - host: kubeop.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubeop-api
                port:
                  number: 8080
