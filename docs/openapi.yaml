        - in: query
          name: limit
          required: false
          description: Number of releases to return (default 20, max 100).
          schema: { type: integer }
        - in: query
          name: cursor
          required: false
          description: Use the `nextCursor` release ID from the previous page with the same project/app IDs to fetch older releases.
          schema: { type: string }
      responses:
        '200':
          description: Release history page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppReleasePage' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
