openapi: 3.0.3
info:
  title: KubeOP API
  version: 0.8.10
  description: |
    Out-of-cluster control plane API for managing clusters, users, and projects.
    Admin endpoints require a Bearer JWT with claim {"role":"admin"} unless DISABLE_AUTH=true.
    Startup logs record configuration and scheduler bootstrap metadata for easier operations triage.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Version
  - name: Clusters
  - name: Users
  - name: Projects
  - name: Kubeconfigs
components:
  headers:
    XRequestId:
      description: Correlation identifier echoed in every response for log lookups.
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Status:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Version:
      type: object
      properties:
        version: { type: string }
        commit: { type: string }
        date:   { type: string }
      required: [version, commit, date]
    ClusterCreate:
      type: object
      properties:
        name: { type: string }
        kubeconfig_b64: { type: string }
      required: [name, kubeconfig_b64]
    Cluster:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        created_at: { type: string }
      required: [id, name, created_at]
    ClusterHealth:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        healthy: { type: boolean }
        error: { type: string, nullable: true }
        checked_at: { type: string }
      required: [id, name, healthy, checked_at]
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string }
        created_at: { type: string }
      required: [id, name, email, created_at]
    UserBootstrapById:
      type: object
      properties:
        userId: { type: string, format: uuid }
        clusterId: { type: string, format: uuid }
      required: [userId, clusterId]
    UserBootstrapByEmail:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        clusterId: { type: string, format: uuid }
      required: [name, email, clusterId]
    UserBootstrapResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        namespace: { type: string }
        kubeconfig_b64: { type: string }
      required: [user, namespace, kubeconfig_b64]
    KubeconfigEnsureRequest:
      type: object
      properties:
        userId: { type: string, format: uuid }
        clusterId:
          type: string
          format: uuid
          nullable: true
          description: Required when projectId is not provided.
        projectId:
          type: string
          format: uuid
          nullable: true
      required: [userId]
    KubeconfigBinding:
      type: object
      properties:
        id: { type: string, format: uuid }
        cluster_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid, nullable: true }
        namespace: { type: string }
        service_account: { type: string }
        secret_name: { type: string }
        kubeconfig_b64: { type: string }
      required: [id, cluster_id, user_id, namespace, service_account, secret_name, kubeconfig_b64]
    KubeconfigRotateResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        secret_name: { type: string }
        kubeconfig_b64: { type: string }
      required: [id, secret_name, kubeconfig_b64]
    ProjectCreateByUserId:
      type: object
      properties:
        userId: { type: string, format: uuid }
        clusterId: { type: string, format: uuid }
        name: { type: string }
        quotaOverrides:
          type: object
          additionalProperties: { type: string }
      required: [userId, clusterId, name]
    ProjectCreateByEmail:
      type: object
      properties:
        userEmail: { type: string }
        userName: { type: string }
        clusterId: { type: string, format: uuid }
        name: { type: string }
        quotaOverrides:
          type: object
          additionalProperties: { type: string }
      required: [userEmail, clusterId, name]
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        cluster_id: { type: string, format: uuid }
        name: { type: string }
        namespace: { type: string }
        suspended: { type: boolean }
        created_at: { type: string }
      required: [id, user_id, cluster_id, name, namespace, suspended, created_at]
    ProjectCreateResponse:
      type: object
      properties:
        project: { $ref: '#/components/schemas/Project' }
        kubeconfig_b64:
          type: string
          description: Returned only in per-project namespace mode
          nullable: true
      required: [project]
    ProjectStatus:
      type: object
      properties:
        project: { $ref: '#/components/schemas/Project' }
        exists: { type: boolean }
        details:
          type: object
          additionalProperties: { type: boolean }
      required: [project, exists, details]
    ProjectEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        appId: { type: string, format: uuid, nullable: true }
        actorUserId: { type: string, nullable: true }
        kind: { type: string }
        severity: { type: string }
        message: { type: string }
        meta:
          type: object
          additionalProperties: true
          nullable: true
        at: { type: string, format: date-time }
      required: [id, projectId, kind, severity, message, at]
    ProjectEventPage:
      type: object
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/ProjectEvent' }
        nextCursor: { type: string, nullable: true }
      required: [events]
    ProjectEventCreate:
      type: object
      properties:
        kind: { type: string }
        severity:
          type: string
          description: Defaults to INFO when omitted.
        message: { type: string }
        appId: { type: string, format: uuid, nullable: true }
        meta:
          type: object
          additionalProperties: true
          nullable: true
      required: [kind, message]
    ProjectQuota:
      type: object
      properties:
        project: { $ref: '#/components/schemas/Project' }
        defaults:
          type: object
          additionalProperties: { type: string }
        overrides:
          type: object
          additionalProperties: { type: string }
        effective:
          type: object
          additionalProperties: { type: string }
        resourceQuota: { $ref: '#/components/schemas/ProjectResourceQuotaSnapshot' }
        loadBalancers: { $ref: '#/components/schemas/ProjectLoadBalancerQuota' }
      required: [project, defaults, overrides, effective, resourceQuota, loadBalancers]
    ProjectResourceQuotaSnapshot:
      type: object
      properties:
        name: { type: string }
        hard:
          type: object
          additionalProperties: { type: string }
        used:
          type: object
          additionalProperties: { type: string }
      required: [name, hard, used]
    ProjectLoadBalancerQuota:
      type: object
      properties:
        default: { type: integer }
        override:
          type: integer
          nullable: true
        effective: { type: integer }
        used: { type: integer }
      required: [default, effective, used]
    QuotaPatch:
      type: object
      properties:
        overrides:
          type: object
          additionalProperties: { type: string }
      required: [overrides]
    Ok:
      type: object
      properties:
        status: { type: string }
      required: [status]
    ConfigAttachRequest:
      type: object
      properties:
        name: { type: string }
        keys:
          type: array
          items: { type: string }
        prefix:
          type: string
      required: [name]
    ConfigDetachRequest:
      type: object
      properties:
        name: { type: string }
      required: [name]
    SecretAttachRequest:
      type: object
      properties:
        name: { type: string }
        keys:
          type: array
          items: { type: string }
        prefix:
          type: string
      required: [name]
    SecretDetachRequest:
      type: object
      properties:
        name: { type: string }
      required: [name]

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
  /readyz:
    get:
      tags: [Health]
      summary: Readiness check
      description: |
        Returns 200 when dependencies respond. Failures emit structured logs and increment
        the `readyz_failures_total{reason=...}` Prometheus counter (`service_missing`, `health_check_failed`, etc.).
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
        '503':
          description: Not ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
              examples:
                serviceMissing:
                  summary: Dependencies missing
                  value: { status: not_ready, error: "service unavailable" }
  /v1/version:
    get:
      tags: [Version]
      summary: Build metadata
      security: []
      responses:
        '200':
          description: Version
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Version' }

  /v1/clusters:
    post:
      tags: [Clusters]
      summary: Register a cluster
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClusterCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cluster' }
    get:
      tags: [Clusters]
      summary: List clusters
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Cluster' }
  /v1/clusters/health:
    get:
      tags: [Clusters]
      summary: List cluster health
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ClusterHealth' }
  /v1/clusters/{id}/health:
    get:
      tags: [Clusters]
      summary: Get cluster health
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterHealth' }

  /v1/users/bootstrap:
    post:
      tags: [Users]
      summary: Bootstrap user namespace and return kubeconfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/UserBootstrapById'
                - $ref: '#/components/schemas/UserBootstrapByEmail'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserBootstrapResponse' }

  /v1/users:
    get:
      tags: [Users]
      summary: List users
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
  /v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404':
          description: Not found
    delete:
      tags: [Users]
      summary: Soft-delete user and delete namespaces
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ok' }
  /v1/users/{id}/projects:
    get:
      tags: [Users, Projects]
      summary: List projects for a user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Project' }

  /v1/projects:
    post:
      tags: [Projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ProjectCreateByUserId'
                - $ref: '#/components/schemas/ProjectCreateByEmail'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectCreateResponse' }
    get:
      tags: [Projects]
      summary: List projects
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Project' }

  /v1/projects/{id}:
    get:
      tags: [Projects]
      summary: Get project status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectStatus' }
    delete:
      tags: [Projects]
      summary: Delete project (soft-delete in DB; hard delete in K8s)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ok' }

  /v1/projects/{id}/events:
    get:
      tags: [Projects]
      summary: List project events
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: kind
          schema: { type: string }
          description: Comma-separated kinds to include.
        - in: query
          name: severity
          schema: { type: string }
          description: Comma-separated severities to include.
        - in: query
          name: actor
          schema: { type: string }
          description: Filter by actor user ID.
        - in: query
          name: since
          schema: { type: string, format: date-time }
          description: Return events at or after this timestamp.
        - in: query
          name: cursor
          schema: { type: string }
          description: Resume listing using the `nextCursor` token from a previous call.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500 }
          description: Maximum number of events to return (default 50).
        - in: query
          name: search
          schema: { type: string }
          description: Case-insensitive substring match applied to kind and message.
        - in: query
          name: grep
          schema: { type: string }
          description: Alias for `search`.
      responses:
        '200':
          description: OK
          headers:
            X-Request-Id: { $ref: '#/components/headers/XRequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectEventPage' }
    post:
      tags: [Projects]
      summary: Append a custom project event
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectEventCreate' }
      responses:
        '201':
          description: Created
          headers:
            X-Request-Id: { $ref: '#/components/headers/XRequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectEvent' }

  /v1/projects/{id}/quota:
    get:
      tags: [Projects]
      summary: Get project quota snapshot (per-project mode)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectQuota' }
    patch:
      tags: [Projects]
      summary: Update project quota overrides (per-project mode)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuotaPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ok' }

  /v1/projects/{id}/suspend:
    post:
      tags: [Projects]
      summary: Suspend project (per-project mode)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ok' }

  /v1/projects/{id}/unsuspend:
    post:
      tags: [Projects]
      summary: Unsuspend project (per-project mode)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ok' }
  /v1/templates:
    post:
      summary: Register app template
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                kind: { type: string, enum: [helm, manifests, blueprint] }
                spec: { type: object }
              required: [name, kind, spec]
      responses:
        '201':
          description: Created
  /v1/projects/{id}/apps:
    get:
      summary: List apps in project (summary)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    
    post:
      summary: Deploy application to a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                flavor: { type: string }
                resources: { type: object, additionalProperties: { type: string } }
                replicas: { type: integer }
                env: { type: object, additionalProperties: { type: string } }
                secrets: { type: array, items: { type: string } }
                ports:
                  type: array
                  items:
                    type: object
                    properties:
                      containerPort: { type: integer }
                      servicePort: { type: integer }
                      protocol: { type: string }
                      serviceType: { type: string, enum: [ClusterIP, LoadBalancer] }
                domain: { type: string }
                repo: { type: string }
                webhookSecret: { type: string }
                image: { type: string }
                helm: { type: object }
                manifests: { type: array, items: { type: string } }
              required: [name]
      responses:
        '201':
          description: Created
  /v1/projects/{id}/logs:
    get:
      summary: Fetch project log file or tail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: tail
          schema:
            type: integer
            minimum: 0
            maximum: 5000
          description: Number of trailing log lines to return (capped at 5,000). When omitted, the full log file is streamed.
      responses:
        '200':
          description: OK
          content:
            text/plain: {}
        '400':
          description: Invalid tail parameter
        '404':
          description: Log file not found
  /v1/projects/{id}/apps/{appId}/logs:
    get:
      summary: Stream application logs
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: appId
          required: true
          schema: { type: string }
        - in: query
          name: container
          schema: { type: string }
        - in: query
          name: tailLines
          schema: { type: integer }
        - in: query
          name: follow
          schema: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            text/plain: {}
  /v1/projects/{id}/kubeconfig/renew:
    post:
      summary: Renew project kubeconfig token
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /v1/webhooks/git:
    post:
      summary: CI git webhook
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: OK
  /v1/projects/{id}/apps/{appId}:
    delete:
      summary: Delete application (soft-delete in DB; hard delete in K8s)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: appId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ok' }
  /v1/users/{id}/kubeconfig/renew:
    post:
      tags: [Users]
      summary: Renew user kubeconfig token
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clusterId: { type: string, format: uuid }
              required: [clusterId]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  kubeconfig_b64: { type: string }
                required: [kubeconfig_b64]
  /v1/kubeconfigs:
    post:
      tags: [Kubeconfigs]
      summary: Ensure kubeconfig binding (user or project scope)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KubeconfigEnsureRequest' }
      responses:
        '200':
          description: Binding ensured
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KubeconfigBinding' }
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]
  /v1/kubeconfigs/rotate:
    post:
      tags: [Kubeconfigs]
      summary: Rotate kubeconfig binding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string, format: uuid }
              required: [id]
      responses:
        '200':
          description: Rotated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KubeconfigRotateResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]
  /v1/kubeconfigs/{id}:
    delete:
      tags: [Kubeconfigs]
      summary: Revoke kubeconfig binding
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
