openapi: 3.0.3
info:
  title: KubeOP API
  version: 0.8.18
  description: |
    Out-of-cluster control plane API for managing clusters, users, and projects.
    Admin endpoints require a Bearer JWT with claim {"role":"admin"} unless DISABLE_AUTH=true.
    Startup logs record configuration and scheduler bootstrap metadata for easier operations triage.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Version
  - name: Clusters
  - name: Users
  - name: Projects
  - name: Apps
  - name: Kubeconfigs
  - name: Credentials
  - name: Templates
components:
  headers:
    XRequestId:
      description: Correlation identifier echoed in every response for log lookups.
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Status:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Version:
      type: object
      properties:
        version: { type: string }
        commit: { type: string }
        date:   { type: string }
      required: [version, commit, date]
    ClusterCreate:
      type: object
      properties:
        name: { type: string }
        kubeconfig: { type: string }
        kubeconfig_b64: { type: string }
        owner: { type: string }
        contact: { type: string }
        environment: { type: string }
        region: { type: string }
        apiServer: { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }
      required: [name]
      anyOf:
        - required: [kubeconfig]
        - required: [kubeconfig_b64]
    Cluster:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        owner: { type: string, nullable: true }
        contact: { type: string, nullable: true }
        environment: { type: string, nullable: true }
        region: { type: string, nullable: true }
        apiServer: { type: string, nullable: true }
        description: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        created_at: { type: string }
        lastSeen: { type: string, nullable: true }
        lastStatus:
          $ref: '#/components/schemas/ClusterStatus'
      required: [id, name, created_at]
    ClusterStatus:
      type: object
      properties:
        id: { type: string, format: uuid }
        clusterId: { type: string, format: uuid }
        healthy: { type: boolean }
        message: { type: string, nullable: true }
        apiServerVersion: { type: string, nullable: true }
        nodeCount: { type: integer, nullable: true }
        checkedAt: { type: string }
        details:
          type: object
          additionalProperties: {}
      required: [id, clusterId, healthy, checkedAt]
    ClusterHealth:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        healthy: { type: boolean }
        error: { type: string, nullable: true }
        message: { type: string, nullable: true }
        statusId: { type: string, nullable: true }
        apiServerVersion: { type: string, nullable: true }
        nodeCount: { type: integer, nullable: true }
        details:
          type: object
          additionalProperties: {}
        checked_at: { type: string }
      required: [id, name, healthy, checked_at]
    ClusterUpdate:
      type: object
      properties:
        owner: { type: string }
        contact: { type: string }
        environment: { type: string }
        region: { type: string }
        apiServer: { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string }
        created_at: { type: string }
      required: [id, name, email, created_at]
    UserBootstrapById:
      type: object
      properties:
        userId: { type: string, format: uuid }
        clusterId: { type: string, format: uuid }
      required: [userId, clusterId]
    UserBootstrapByEmail:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        clusterId: { type: string, format: uuid }
      required: [name, email, clusterId]
    UserBootstrapResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        namespace: { type: string }
        kubeconfig_b64: { type: string }
      required: [user, namespace, kubeconfig_b64]
    KubeconfigEnsureRequest:
      type: object
      properties:
        userId: { type: string, format: uuid }
        clusterId:
          type: string
          format: uuid
          nullable: true
          description: Required when projectId is not provided.
        projectId:
          type: string
          format: uuid
          nullable: true
      required: [userId]
    KubeconfigBinding:
      type: object
      properties:
        id: { type: string, format: uuid }
        cluster_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid, nullable: true }
        namespace: { type: string }
        service_account: { type: string }
        secret_name: { type: string }
        kubeconfig_b64: { type: string }
      required: [id, cluster_id, user_id, namespace, service_account, secret_name, kubeconfig_b64]
    KubeconfigRotateResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        secret_name: { type: string }
        kubeconfig_b64: { type: string }
      required: [id, secret_name, kubeconfig_b64]
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]
    TemplateSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, name, kind, description, createdAt]
    TemplateCreateRequest:
      type: object
      properties:
        name: { type: string }
        kind: { type: string }
        description: { type: string }
        schema: { type: object }
        defaults: { type: object }
        example: { type: object }
        base: { type: object }
        deliveryTemplate: { type: string }
      required: [name, kind, description, schema, defaults, deliveryTemplate]
    TemplateDetail:
      allOf:
        - $ref: '#/components/schemas/TemplateSummary'
        - type: object
          properties:
            schema: { type: object }
            defaults: { type: object }
            example: { type: object }
            base: { type: object }
            deliveryTemplate: { type: string }
          required: [schema, defaults, deliveryTemplate]
    TemplateRenderRequest:
      type: object
      properties:
        values: { type: object }
    TemplateRenderedApp:
      type: object
      properties:
        name: { type: string }
        flavor: { type: string }
        resources: { type: object, additionalProperties: { type: string } }
        replicas: { type: integer, nullable: true }
        env: { type: object, additionalProperties: { type: string } }
        secrets: { type: array, items: { type: string } }
        ports:
          type: array
          items:
            type: object
            properties:
              containerPort: { type: integer }
              servicePort: { type: integer }
              protocol: { type: string }
              serviceType: { type: string }
        domain: { type: string }
        repo: { type: string }
        webhookSecret: { type: string }
        image: { type: string }
        helm: { type: object }
        manifests: { type: array, items: { type: string } }
      required: [name]
    TemplateRenderResponse:
      type: object
      properties:
        template: { $ref: '#/components/schemas/TemplateSummary' }
        values: { type: object }
        app: { $ref: '#/components/schemas/TemplateRenderedApp' }
      required: [template, values, app]
    AppDeployResult:
      type: object
      properties:
        appId: { type: string }
        name: { type: string }
        service: { type: string, nullable: true }
        ingress: { type: string, nullable: true }
      required: [appId, name]
    CredentialScope:
      type: object
      properties:
        type:
          type: string
          description: Scope type
          enum: [user, project]
        id:
          type: string
          format: uuid
      required: [type, id]
    GitCredentialAuth:
      type: object
      properties:
        type:
          type: string
          enum: [token, basic, ssh]
        username: { type: string, nullable: true }
        token: { type: string, nullable: true }
        password: { type: string, nullable: true }
        privateKey: { type: string, nullable: true }
        passphrase: { type: string, nullable: true }
      required: [type]
    GitCredentialCreateRequest:
      type: object
      properties:
        name: { type: string }
        scope: { $ref: '#/components/schemas/CredentialScope' }
        auth: { $ref: '#/components/schemas/GitCredentialAuth' }
      required: [name, scope, auth]
    GitCredential:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        scopeType:
          type: string
          enum: [USER, PROJECT]
        scopeId: { type: string, format: uuid }
        authType:
          type: string
          enum: [TOKEN, BASIC, SSH]
        username: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, scopeType, scopeId, authType, createdAt, updatedAt]
    GitCredentialSecret:
      type: object
      properties:
        token: { type: string, nullable: true }
        password: { type: string, nullable: true }
        privateKey: { type: string, nullable: true }
        passphrase: { type: string, nullable: true }
    GitCredentialWithSecret:
      allOf:
        - $ref: '#/components/schemas/GitCredential'
        - type: object
          properties:
            secret: { $ref: '#/components/schemas/GitCredentialSecret' }
          required: [secret]
    RegistryCredentialAuth:
      type: object
      properties:
        type:
          type: string
          enum: [token, basic]
        username: { type: string, nullable: true }
        token: { type: string, nullable: true }
        password: { type: string, nullable: true }
      required: [type]
    RegistryCredentialCreateRequest:
      type: object
      properties:
        name: { type: string }
        registry: { type: string }
        scope: { $ref: '#/components/schemas/CredentialScope' }
        auth: { $ref: '#/components/schemas/RegistryCredentialAuth' }
      required: [name, registry, scope, auth]
    RegistryCredential:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        registry: { type: string }
        scopeType:
          type: string
          enum: [USER, PROJECT]
        scopeId: { type: string, format: uuid }
        authType:
          type: string
          enum: [TOKEN, BASIC]
        username: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, registry, scopeType, scopeId, authType, createdAt, updatedAt]
    RegistryCredentialSecret:
      type: object
      properties:
        token: { type: string, nullable: true }
        password: { type: string, nullable: true }
    RegistryCredentialWithSecret:
      allOf:
        - $ref: '#/components/schemas/RegistryCredential'
        - type: object
          properties:
            secret: { $ref: '#/components/schemas/RegistryCredentialSecret' }
          required: [secret]
    ProjectCreateByUserId:
      type: object
      properties:
        userId: { type: string, format: uuid }
        clusterId: { type: string, format: uuid }
        name: { type: string }
        quotaOverrides:
          type: object
          additionalProperties: { type: string }
      required: [userId, clusterId, name]
    ProjectCreateByEmail:
      type: object
      properties:
        userEmail: { type: string }
        userName: { type: string }
        clusterId: { type: string, format: uuid }
        name: { type: string }
        quotaOverrides:
          type: object
          additionalProperties: { type: string }
      required: [userEmail, clusterId, name]
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        cluster_id: { type: string, format: uuid }
        name: { type: string }
        namespace: { type: string }
        suspended: { type: boolean }
        created_at: { type: string }
      required: [id, user_id, cluster_id, name, namespace, suspended, created_at]
    ProjectCreateResponse:
      type: object
      properties:
        project: { $ref: '#/components/schemas/Project' }
        kubeconfig_b64:
          type: string
          description: Returned only in per-project namespace mode
          nullable: true
      required: [project]
    ProjectStatus:
      type: object
      properties:
        project: { $ref: '#/components/schemas/Project' }
        exists: { type: boolean }
        details:
          type: object
          additionalProperties: { type: boolean }
      required: [project, exists, details]
    ProjectEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        appId: { type: string, format: uuid, nullable: true }
        actorUserId: { type: string, nullable: true }
        kind: { type: string }
        severity: { type: string }
        message: { type: string }
        meta:
          type: object
          additionalProperties: true
          nullable: true
        at: { type: string, format: date-time }
      required: [id, projectId, kind, severity, message, at]
    ProjectEventPage:
      type: object
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/ProjectEvent' }
        nextCursor: { type: string, nullable: true }
      required: [events]
    ProjectEventCreate:
      type: object
      properties:
        kind: { type: string }
        severity:
          type: string
          description: Defaults to INFO when omitted.
        message: { type: string }
        appId: { type: string, format: uuid, nullable: true }
        meta:
          type: object
          additionalProperties: true
          nullable: true
      required: [kind, message]
    ProjectQuota:
      type: object
      properties:
        project: { $ref: '#/components/schemas/Project' }
        defaults:
          type: object
          additionalProperties: { type: string }
        overrides:
          type: object
          additionalProperties: { type: string }
        effective:
          type: object
          additionalProperties: { type: string }
        resourceQuota: { $ref: '#/components/schemas/ProjectResourceQuotaSnapshot' }
        loadBalancers: { $ref: '#/components/schemas/ProjectLoadBalancerQuota' }
      required: [project, defaults, overrides, effective, resourceQuota, loadBalancers]
    ProjectResourceQuotaSnapshot:
      type: object
      properties:
        name: { type: string }
        hard:
          type: object
          additionalProperties: { type: string }
        used:
          type: object
          additionalProperties: { type: string }
      required: [name, hard, used]
    ProjectLoadBalancerQuota:
      type: object
      properties:
        default: { type: integer }
        override:
          type: integer
          nullable: true
        effective: { type: integer }
        used: { type: integer }
      required: [default, effective, used]
    QuotaPatch:
      type: object
      properties:
        overrides:
          type: object
          additionalProperties: { type: string }
      required: [overrides]
    Ok:
      type: object
      properties:
        status: { type: string }
      required: [status]
    ConfigAttachRequest:
      type: object
      properties:
        name: { type: string }
        keys:
          type: array
          items: { type: string }
        prefix:
          type: string
      required: [name]
    ConfigDetachRequest:
      type: object
      properties:
        name: { type: string }
      required: [name]
    SecretAttachRequest:
      type: object
      properties:
        name: { type: string }
        keys:
          type: array
          items: { type: string }
        prefix:
          type: string
      required: [name]
    SecretDetachRequest:
      type: object
      properties:
        name: { type: string }
      required: [name]
    AppValidationRequest:
      type: object
      properties:
        projectId: { type: string, format: uuid }
        name: { type: string }
        flavor: { type: string }
        resources:
          type: object
          additionalProperties: { type: string }
        replicas: { type: integer }
        env:
          type: object
          additionalProperties: { type: string }
        secrets:
          type: array
          items: { type: string }
        ports:
          type: array
          items:
            type: object
            properties:
              containerPort: { type: integer }
              servicePort: { type: integer }
              protocol: { type: string }
              serviceType: { type: string, enum: [ClusterIP, LoadBalancer] }
        domain: { type: string }
        repo: { type: string }
        webhookSecret: { type: string }
        image: { type: string }
        helm:
          type: object
          additionalProperties: true
        manifests:
          type: array
          items: { type: string }
      required: [projectId, name]
    LoadBalancerSummary:
      type: object
      properties:
        requested: { type: integer }
        existing: { type: integer }
        limit: { type: integer }
      required: [requested, existing, limit]
    RenderedObjectSummary:
      type: object
      properties:
        kind: { type: string }
        name: { type: string }
        namespace: { type: string }
      required: [kind, name]
    AppValidationSummary:
      type: object
      properties:
        projectId: { type: string }
        projectNamespace: { type: string }
        clusterId: { type: string }
        source: { type: string, enum: [image, manifests, helm] }
        flavor: { type: string, nullable: true }
        kubeName: { type: string }
        replicas: { type: integer }
        resources:
          type: object
          additionalProperties: { type: string }
        ports:
          type: array
          items:
            type: object
            properties:
              containerPort: { type: integer }
              servicePort: { type: integer }
              protocol: { type: string }
              serviceType: { type: string, enum: [ClusterIP, LoadBalancer] }
        domain: { type: string }
        loadBalancers: { $ref: '#/components/schemas/LoadBalancerSummary' }
        renderedObjects:
          type: array
          items: { $ref: '#/components/schemas/RenderedObjectSummary' }
        helmChart: { type: string }
        helmValues:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items: { type: string }
      required: [projectId, projectNamespace, clusterId, source, kubeName, replicas, loadBalancers]
    ReleaseSource:
      type: object
      properties:
        type: { type: string, enum: [image, manifests, helm] }
        image: { type: string }
        helm:
          type: object
          additionalProperties: true
        manifests:
          type: array
          items: { type: string }
      required: [type]
    ReleaseSpec:
      type: object
      properties:
        name: { type: string }
        kubeName: { type: string }
        flavor: { type: string, nullable: true }
        resources:
          type: object
          additionalProperties: { type: string }
        replicas: { type: integer }
        env:
          type: object
          additionalProperties: { type: string }
        secrets:
          type: array
          items: { type: string }
        ports:
          type: array
          items:
            type: object
            properties:
              containerPort: { type: integer }
              servicePort: { type: integer }
              protocol: { type: string }
              serviceType: { type: string, enum: [ClusterIP, LoadBalancer] }
        domain: { type: string }
        host: { type: string }
        repo: { type: string }
        source: { $ref: '#/components/schemas/ReleaseSource' }
      required: [name, kubeName, replicas, source]
    AppRelease:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        appId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        source: { type: string }
        specDigest: { type: string }
        renderDigest: { type: string }
        repo: { type: string }
        spec: { $ref: '#/components/schemas/ReleaseSpec' }
        renderedObjects:
          type: array
          items: { $ref: '#/components/schemas/RenderedObjectSummary' }
        loadBalancers: { $ref: '#/components/schemas/LoadBalancerSummary' }
        warnings:
          type: array
          items: { type: string }
        helmChart: { type: string }
        helmValues:
          type: object
          additionalProperties: true
        helmRenderSha: { type: string }
        manifestsSha: { type: string }
        status: { type: string }
        message: { type: string }
      required: [id, projectId, appId, createdAt, source, specDigest, renderDigest, spec, renderedObjects, loadBalancers, status]
    AppReleasePage:
      type: object
      properties:
        releases:
          type: array
          items: { $ref: '#/components/schemas/AppRelease' }
        nextCursor: { type: string }
      required: [releases]

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        '200':
          description: OK (AppStatus objects now include `domains[]` with `fqdn` and `certificateStatus`.)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
  /readyz:
    get:
      tags: [Health]
      summary: Readiness check
      description: |
        Returns 200 when dependencies respond. Failures emit structured logs and increment
        the `readyz_failures_total{reason=...}` Prometheus counter (`service_missing`, `health_check_failed`, etc.).
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
        '503':
          description: Not ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
              examples:
                serviceMissing:
                  summary: Dependencies missing
                  value: { status: not_ready, error: "service unavailable" }
  /v1/version:
    get:
      tags: [Version]
      summary: Build metadata
      security: []
      responses:
        '200':
          description: Version
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Version' }

  /v1/clusters:
    post:
      tags: [Clusters]
      summary: Register a cluster
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClusterCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cluster' }
    get:
      tags: [Clusters]
      summary: List clusters
      responses:
        '200':
          description: OK (AppStatus objects now include `domains[]` with `fqdn` and `certificateStatus`.)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Cluster' }
  /v1/clusters/{id}:
    get:
      tags: [Clusters]
      summary: Get cluster metadata
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cluster' }
        '404': { description: Not Found }
    patch:
      tags: [Clusters]
      summary: Update cluster metadata
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClusterUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cluster' }
        '404': { description: Not Found }
  /v1/clusters/{id}/status:
    get:
      tags: [Clusters]
      summary: List cluster status history
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ClusterStatus' }
  /v1/clusters/health:
    get:
      tags: [Clusters]
      summary: List cluster health
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ClusterHealth' }
  /v1/clusters/{id}/health:
    get:
      tags: [Clusters]
      summary: Get cluster health
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
