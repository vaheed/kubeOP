<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>KubeOP OpenAPI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
      html, body { height: 100%; }
      body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji'; }
      #redoc { height: 100%; }
      .error { padding: 24px; color: #b91c1c; font-weight: 600; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  </head>
  <body>
    <div id="redoc"></div>
    <script>
      (function() {
        var mount = document.getElementById('redoc');
        function loadSpec(url) {
          return fetch(url, {
            cache: 'no-store',
            headers: {
              'Cache-Control': 'no-cache, no-store, max-age=0',
              'Pragma': 'no-cache'
            }
          }).then(function(res) {
            if (!res.ok || res.status === 304) throw new Error('HTTP ' + res.status);
            return res.text();
          }).then(function(txt) {
            var spec = jsyaml.load(txt);
            if (!spec) throw new Error('Empty spec');
            Redoc.init(spec, { scrollYOffset: 0 }, mount);
          });
        }
        var ts = Date.now();
        loadSpec('openapi.yaml?v=' + ts).catch(function() {
          // Force another attempt with a different cache buster
          return loadSpec('openapi.yaml?v=' + (ts + 1));
        }).catch(function(err) {
          mount.innerHTML = '<div class="error">Failed to load OpenAPI spec. Please hard refresh (Shift+Reload). Error: ' + (err && err.message || err) + '</div>';
        });
      })();
    </script>
  </body>
  </html>
